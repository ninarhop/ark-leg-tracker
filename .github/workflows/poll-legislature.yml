name: Poll Arkansas Legislature

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: poll-legislature
  cancel-in-progress: true

jobs:
  poll:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll LegiScan and update static data
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/update_legislature.py

      - name: Commit data changes
        id: commit
        run: |
          if [ -z "$(git status --porcelain -- frontend/tracker-data.json frontend/vote-details.json frontend/legislators.json frontend/legiscan-cache.json frontend/automation-status.json)" ]; then
            echo "No legislature data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "ark-leg-tracker-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/tracker-data.json frontend/vote-details.json frontend/legislators.json frontend/legiscan-cache.json frontend/automation-status.json
          git commit -m "Update Arkansas legislature data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload static site
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
